<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resilix — Business People Dependency</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .glass { 
      background: rgba(255,255,255,0.95); 
      backdrop-filter: blur(12px); 
    }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-cyan-50 min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-8 md:py-12">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-3">
        <span class="text-3xl">📊</span>
        <h1 id="appTitle" class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-indigo-600 to-cyan-600 bg-clip-text text-transparent">Resilix</h1>
      </div>
      
      <!-- Language Switch -->
      <div class="flex gap-1 bg-white rounded-3xl shadow p-1">
        <button onclick="switchLanguage('ru')" id="btn-ru"
                class="px-6 py-2 rounded-3xl font-medium text-sm transition">🇷🇺 RU</button>
        <button onclick="switchLanguage('en')" id="btn-en"
                class="px-6 py-2 rounded-3xl font-medium text-sm bg-indigo-600 text-white transition">🇬🇧 EN</button>
      </div>
    </div>

    <p id="subtitle" class="text-center text-xl md:text-2xl text-gray-600 mb-12 max-w-2xl mx-auto">
      How dependent is your business on people?
    </p>

    <!-- Form -->
    <div class="glass rounded-3xl shadow-2xl p-8 md:p-10 mb-12">
      <h2 id="formTitle" class="text-2xl font-semibold mb-8 text-gray-800">Enter company data</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="space-y-6">
          <div>
            <label id="labelCompany" class="block text-sm font-medium text-gray-600 mb-2">Company name</label>
            <input id="company" type="text" value="Walmart" 
                   class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none text-lg">
          </div>
          <div>
            <label id="labelEmployees" class="block text-sm font-medium text-gray-600 mb-2">Number of employees</label>
            <input id="employees" type="number" value="2100000" 
                   class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none text-lg">
          </div>
        </div>
        
        <div class="space-y-6">
          <div>
            <label id="labelProfit" class="block text-sm font-medium text-gray-600 mb-2">Net profit (billion USD)</label>
            <input id="profit" type="number" step="0.1" value="21.9" 
                   class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none text-lg">
          </div>
          <div>
            <label id="labelRevenue" class="block text-sm font-medium text-gray-600 mb-2">Revenue (billion USD)</label>
            <input id="revenue" type="number" step="0.1" value="706" 
                   class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none text-lg">
          </div>
        </div>
      </div>

      <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-8">
        <div>
          <label id="labelLabor" class="block text-sm font-medium text-gray-600 mb-2">Labor costs (% of revenue)</label>
          <input id="laborCost" type="number" step="0.1" value="21" 
                 class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none text-lg">
        </div>
        <div>
          <label id="labelAutomation" class="block text-sm font-medium text-gray-600 mb-2">Automation level (% of tasks)</label>
          <div class="flex items-center gap-4">
            <input id="automation" type="range" min="0" max="100" value="35" 
                   class="w-full accent-indigo-600">
            <span id="automationValue" class="font-semibold text-2xl w-16 text-indigo-600">35%</span>
          </div>
        </div>
      </div>

      <!-- Quick examples -->
      <div class="mt-10">
        <p id="examplesTitle" class="text-sm font-medium text-gray-500 mb-4">Quick examples of giants:</p>
        <div class="grid grid-cols-3 gap-4">
          <button onclick="loadExample(0)" 
                  class="bg-white hover:bg-emerald-50 border border-emerald-200 hover:border-emerald-300 font-semibold py-5 rounded-2xl shadow-sm transition-all flex flex-col items-center gap-2 text-emerald-700">
            🛒 Walmart
          </button>
          <button onclick="loadExample(1)" 
                  class="bg-white hover:bg-orange-50 border border-orange-200 hover:border-orange-300 font-semibold py-5 rounded-2xl shadow-sm transition-all flex flex-col items-center gap-2 text-orange-700">
            📦 Amazon
          </button>
          <button onclick="loadExample(2)" 
                  class="bg-white hover:bg-blue-50 border border-blue-200 hover:border-blue-300 font-semibold py-5 rounded-2xl shadow-sm transition-all flex flex-col items-center gap-2 text-blue-700">
            🛢️ CNPC
          </button>
        </div>
      </div>

      <button onclick="analyze()" id="analyzeBtn"
              class="mt-10 w-full bg-gradient-to-r from-indigo-600 to-cyan-600 hover:from-indigo-700 hover:to-cyan-700 text-white font-semibold text-xl py-6 rounded-3xl shadow-lg shadow-indigo-500/30 transition-all active:scale-95">
        🚀 Analyze Business
      </button>
    </div>

    <!-- Results -->
    <div id="result" class="hidden">
      <div class="glass rounded-3xl shadow-2xl p-8 md:p-10">
        
        <div id="verdict" class="text-4xl md:text-5xl font-bold text-center mb-10 py-6 rounded-3xl"></div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-12">
          <div class="bg-white rounded-3xl shadow-inner p-6 text-center">
            <p id="metric1" class="text-gray-500 text-sm font-medium">People Dependency</p>
            <p id="dependencyScore" class="text-6xl font-bold mt-3 text-indigo-600"></p>
          </div>
          <div class="bg-white rounded-3xl shadow-inner p-6 text-center">
            <p id="metric2" class="text-gray-500 text-sm font-medium">Profit per Employee</p>
            <p id="profitPerEmployee" class="text-6xl font-bold mt-3 text-emerald-600"></p>
          </div>
          <div class="bg-white rounded-3xl shadow-inner p-6 text-center">
            <p id="metric3" class="text-gray-500 text-sm font-medium">Automation Level</p>
            <p id="autoLevel" class="text-6xl font-bold mt-3 text-cyan-600"></p>
          </div>
        </div>

        <h3 id="comparisonTitle" class="text-2xl font-semibold mb-6 text-gray-800">Comparison with giants</h3>
        <div class="overflow-x-auto rounded-3xl border border-gray-100 mb-12">
          <table class="w-full text-sm">
            <thead class="bg-gray-50">
              <tr>
                <th id="thCompany" class="text-left py-5 px-8 font-medium text-gray-600">Company</th>
                <th id="thEmployees" class="text-right py-5 px-8 font-medium text-gray-600">Employees</th>
                <th id="thProfit" class="text-right py-5 px-8 font-medium text-gray-600">Profit (bn $)</th>
                <th id="thDep" class="text-center py-5 px-8 font-medium text-gray-600">Dependency</th>
              </tr>
            </thead>
            <tbody id="comparisonTable" class="divide-y"></tbody>
          </table>
        </div>

        <div class="mb-12">
          <h3 id="vizTitle" class="text-2xl font-semibold mb-6 text-gray-800">Business Strength Visualization</h3>
          <div class="bg-white rounded-3xl p-6 shadow-inner">
            <canvas id="radarChart" class="w-full max-w-[520px] mx-auto"></canvas>
          </div>
        </div>

        <div id="criticalPoint" class="rounded-3xl p-8 border-2 border-amber-300 bg-amber-50"></div>

        <div class="text-center mt-12">
          <button onclick="newCalculation()" 
                  class="text-indigo-600 hover:text-indigo-700 font-medium text-lg flex items-center gap-2 mx-auto">
            ← <span id="newCalcText">New Calculation</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentLang = 'en';
    let myChart = null;

    const translations = {
      ru: {
        appTitle: "Resilix",
        subtitle: "Насколько компания зависит от персонала?",
        formTitle: "Введите данные компании",
        labelCompany: "Название компании",
        labelEmployees: "Количество сотрудников",
        labelProfit: "Чистая прибыль (млрд USD)",
        labelRevenue: "Выручка (млрд USD)",
        labelLabor: "Затраты на персонал (% от выручки)",
        labelAutomation: "Уровень автоматизации (% задач)",
        examplesTitle: "Быстрые примеры гигантов:",
        analyzeBtn: "🚀 Проанализировать бизнес",
        newCalcText: "Новый расчёт",
        metric1: "Зависимость от персонала",
        metric2: "Прибыль на 1 сотрудника",
        metric3: "Уровень автоматизации",
        comparisonTitle: "Сравнение с гигантами",
        vizTitle: "Визуализация силы бизнеса",
        thCompany: "Компания",
        thEmployees: "Сотрудников",
        thProfit: "Прибыль (млрд $)",
        thDep: "Зависимость"
      },
      en: {
        appTitle: "Resilix",
        subtitle: "How dependent is your business on people?",
        formTitle: "Enter company data",
        labelCompany: "Company name",
        labelEmployees: "Number of employees",
        labelProfit: "Net profit (billion USD)",
        labelRevenue: "Revenue (billion USD)",
        labelLabor: "Labor costs (% of revenue)",
        labelAutomation: "Automation level (% of tasks)",
        examplesTitle: "Quick examples of giants:",
        analyzeBtn: "🚀 Analyze Business",
        newCalcText: "New Calculation",
        metric1: "People Dependency",
        metric2: "Profit per Employee",
        metric3: "Automation Level",
        comparisonTitle: "Comparison with giants",
        vizTitle: "Business Strength Visualization",
        thCompany: "Company",
        thEmployees: "Employees",
        thProfit: "Profit (bn $)",
        thDep: "Dependency"
      }
    };

    function switchLanguage(lang) {
      currentLang = lang;
      
      // Update buttons
      document.getElementById('btn-ru').classList.toggle('bg-indigo-600', lang === 'ru');
      document.getElementById('btn-ru').classList.toggle('text-white', lang === 'ru');
      document.getElementById('btn-en').classList.toggle('bg-indigo-600', lang === 'en');
      document.getElementById('btn-en').classList.toggle('text-white', lang === 'en');

      // Update all static texts
      const t = translations[lang];
      document.getElementById('appTitle').textContent = t.appTitle;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('formTitle').textContent = t.formTitle;
      document.getElementById('labelCompany').textContent = t.labelCompany;
      document.getElementById('labelEmployees').textContent = t.labelEmployees;
      document.getElementById('labelProfit').textContent = t.labelProfit;
      document.getElementById('labelRevenue').textContent = t.labelRevenue;
      document.getElementById('labelLabor').textContent = t.labelLabor;
      document.getElementById('labelAutomation').textContent = t.labelAutomation;
      document.getElementById('examplesTitle').textContent = t.examplesTitle;
      document.getElementById('analyzeBtn').textContent = t.analyzeBtn;
      document.getElementById('newCalcText').textContent = t.newCalcText;
      document.getElementById('metric1').textContent = t.metric1;
      document.getElementById('metric2').textContent = t.metric2;
      document.getElementById('metric3').textContent = t.metric3;
      document.getElementById('comparisonTitle').textContent = t.comparisonTitle;
      document.getElementById('vizTitle').textContent = t.vizTitle;
      document.getElementById('thCompany').textContent = t.thCompany;
      document.getElementById('thEmployees').textContent = t.thEmployees;
      document.getElementById('thProfit').textContent = t.thProfit;
      document.getElementById('thDep').textContent = t.thDep;

      // Refresh result if visible
      if (!document.getElementById('result').classList.contains('hidden')) {
        analyze();
      }
    }

    function analyze() {
      const company = document.getElementById('company').value.trim() || 'Company';
      const employees = parseFloat(document.getElementById('employees').value) || 0;
      const profit = parseFloat(document.getElementById('profit').value) || 0;
      const revenue = parseFloat(document.getElementById('revenue').value) || 1;
      const laborCost = parseFloat(document.getElementById('laborCost').value) || 15;
      const automation = parseFloat(document.getElementById('automation').value) || 30;

      const profitPerEmp = employees > 0 ? Math.round((profit * 1e9) / employees) : 0;
      const dependency = Math.min(100, Math.max(10, Math.round(laborCost * 2.8 + (100 - automation) * 0.55)));

      const t = translations[currentLang];

      // Verdict
      let verdictHTML = '';
      if (dependency < 45) {
        verdictHTML = `<span class="bg-emerald-100 text-emerald-700 px-10 py-5 rounded-3xl text-4xl inline-block">🟢 ${currentLang === 'ru' ? 'Сильный независимый бизнес' : 'Strong Independent Business'}</span>`;
      } else if (dependency < 70) {
        verdictHTML = `<span class="bg-amber-100 text-amber-700 px-10 py-5 rounded-3xl text-4xl inline-block">🟡 ${currentLang === 'ru' ? 'Зависит от людей, но управляемо' : 'Manageable Dependence'}</span>`;
      } else {
        verdictHTML = `<span class="bg-red-100 text-red-700 px-10 py-5 rounded-3xl text-4xl inline-block">🔴 ${currentLang === 'ru' ? 'Критически зависит от персонала' : 'Critically Dependent'}</span>`;
      }
      document.getElementById('verdict').innerHTML = verdictHTML;

      document.getElementById('dependencyScore').textContent = dependency + '/100';
      document.getElementById('profitPerEmployee').textContent = profitPerEmp.toLocaleString(currentLang === 'ru' ? 'ru-RU' : 'en-US');
      document.getElementById('autoLevel').textContent = automation + '%';

      // Table
      const examples = [
        {name: 'Walmart', emp: 2100000, prof: 21.9, dep: 87},
        {name: 'Amazon', emp: 1576000, prof: 77.7, dep: 68},
        {name: 'CNPC', emp: 1000000, prof: 25, dep: 52},
        {name: company, emp: employees, prof: profit, dep: dependency}
      ];

      let rows = '';
      examples.forEach(ex => {
        const empStr = ex.emp >= 1000000 ? (ex.emp/1000000).toFixed(1) + 'M' : ex.emp.toLocaleString(currentLang === 'ru' ? 'ru-RU' : 'en-US');
        rows += `<tr class="hover:bg-gray-50">
          <td class="py-5 px-8 font-semibold">${ex.name}</td>
          <td class="py-5 px-8 text-right">${empStr}</td>
          <td class="py-5 px-8 text-right">${ex.prof}</td>
          <td class="py-5 px-8 text-center font-bold text-lg">${ex.dep}</td>
        </tr>`;
      });
      document.getElementById('comparisonTable').innerHTML = rows;

      // Radar Chart
      const ctx = document.getElementById('radarChart');
      if (myChart) myChart.destroy();
      myChart = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: currentLang === 'ru' 
            ? ['Независимость от людей', 'Автоматизация', 'Прибыль на сотрудника', 'Масштаб']
            : ['Independence from People', 'Automation', 'Profit per Employee', 'Scale'],
          datasets: [{
            label: company,
            data: [100 - dependency, automation, Math.min(100, profitPerEmp / 40000), Math.min(100, employees / 20000)],
            backgroundColor: 'rgba(99, 102, 241, 0.25)',
            borderColor: '#4f46e5',
            borderWidth: 4,
            pointBackgroundColor: '#fff',
            pointBorderColor: '#4f46e5',
            pointRadius: 5
          }]
        },
        options: {
          scales: { r: { min: 0, max: 100, ticks: { stepSize: 20 } } },
          plugins: { legend: { display: false } }
        }
      });

      // Critical Point
      const criticalHTML = dependency > 75 
        ? `<div class="flex items-start gap-4">
             <div class="text-4xl">⚠️</div>
             <div>
               <p class="font-semibold text-xl text-amber-800 mb-2">${currentLang === 'ru' ? 'Критическая точка невозврата' : 'Point of No Return'}</p>
               <p class="text-amber-700">${currentLang === 'ru' ? 'Если штат упадёт ниже 75–80% — маржа и продажи могут рухнуть необратимо.' : 'If staff drops below 75–80% of current level — margin and sales may collapse irreversibly.'}</p>
               <p class="mt-4 text-amber-600 text-sm">${currentLang === 'ru' ? 'Рекомендация: ускорять автоматизацию и удерживать ключевых сотрудников.' : 'Recommendation: accelerate automation and retain key employees.'}</p>
             </div>
           </div>`
        : `<div class="flex items-start gap-4">
             <div class="text-4xl">✅</div>
             <div>
               <p class="font-semibold text-xl text-emerald-800 mb-2">${currentLang === 'ru' ? 'Бизнес относительно устойчив' : 'Business is relatively resilient'}</p>
               <p class="text-emerald-700">${currentLang === 'ru' ? 'Точка невозврата ещё далеко.' : 'Point of no return is still far away.'}</p>
             </div>
           </div>`;
      document.getElementById('criticalPoint').innerHTML = criticalHTML;

      document.getElementById('result').classList.remove('hidden');
      document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
    }

    function loadExample(n) {
      const presets = [
        {company: 'Walmart', employees: 2100000, profit: 21.9, revenue: 706, laborCost: 21, automation: 35},
        {company: 'Amazon', employees: 1576000, profit: 77.7, revenue: 638, laborCost: 15, automation: 65},
        {company: 'CNPC', employees: 1000000, profit: 25, revenue: 450, laborCost: 7, automation: 45}
      ];
      const p = presets[n];
      document.getElementById('company').value = p.company;
      document.getElementById('employees').value = p.employees;
      document.getElementById('profit').value = p.profit;
      document.getElementById('revenue').value = p.revenue;
      document.getElementById('laborCost').value = p.laborCost;
      document.getElementById('automation').value = p.automation;
      document.getElementById('automationValue').textContent = p.automation + '%';
      analyze();
    }

    function newCalculation() {
      document.getElementById('result').classList.add('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Slider value
    document.getElementById('automation').addEventListener('input', function() {
      document.getElementById('automationValue').textContent = this.value + '%';
    });

    // Initial language
    window.onload = () => {
      document.getElementById('result').classList.add('hidden');
      switchLanguage('en');   // Default language is English
    };
  </script>
</body>
</html>
